# ─── Tema Vumies (violeta) para uosc ───────────────────────────────────────
# Acento violeta (#8B5CF6) en la timeline y elementos activos.
color=foreground=8b5cf6,foreground_text=ffffff,background=0b0b0f,background_text=ffffff

# Sin barra superior (el usuario la quiere fuera). El título sale en los menús.
top_bar=no

# Control de volumen: slider vertical en el borde derecho (se muestra con los controles).
volume=right
volume_size=36

# Timeline tipo barra, siempre visible de forma sutil; se expande al pasar el ratón.
timeline_style=bar
timeline_size=40

# UI en español (intl/es.json viene incluido en uosc).
languages=es,en

# ─── Barra de controles inferior (superpuesta sobre el vídeo) ───────────────
# Volver · menú(audio/subs/cap.) · −10s · +10s · volumen · audio · subtítulos ·
# Calidad/Fuentes · Episodios · Pantalla completa.
# Los botones de "app" escriben en user-data/vumies/nav → la app reacciona (IPC).
controls=command:arrow_back:set user-data/vumies/nav back?Volver,gap,menu,gap,command:replay_10:seek -10?Retroceder 10 s,command:forward_10:seek 10?Avanzar 10 s,space,audio,subtitles,command:tune:set user-data/vumies/nav sources?Calidad / Fuentes,command:format_list_bulleted:set user-data/vumies/nav episodes?Episodios,command:fullscreen:set user-data/vumies/nav fullscreen?Pantalla completa

# Que la timeline ocupe todo el ancho.
controls_size=36
